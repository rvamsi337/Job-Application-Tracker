spring:
  application:
    name: job-tracker-api
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  backup:
    enabled: ${GOOGLE_DRIVE_BACKUP_ENABLED:false}
    cron: ${GOOGLE_DRIVE_BACKUP_CRON:0 0 1 * * *}
    folder-id: ${GOOGLE_DRIVE_FOLDER_ID:}
    service-account-json: ${GOOGLE_SERVICE_ACCOUNT_JSON:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
